<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button type="button" aria-label="Toggle navigation menu" aria-expanded="false"><div class="navicon"></div></button>
        <ul class="visible-links">
          {% if page.lang == "zh-CN" %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">主页</a></li>
            <li class="masthead__menu-item"><a href="#publications">论文与预印本</a></li>
            <li class="masthead__menu-item"><a href="#educations">教育经历</a></li>
            <li class="masthead__menu-item"><a href="#internships">实习经历</a></li>
            <li class="masthead__menu-item masthead__menu-language"><a href="{{ '/' | relative_url }}" lang="en">EN</a></li>
          {% else %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">Homepage</a></li>
            {% for link in site.data.navigation.main %}
              <li class="masthead__menu-item"><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
            {% endfor %}
            <li class="masthead__menu-item masthead__menu-language"><a href="{{ '/zh/' | relative_url }}" lang="zh-CN">中文</a></li>
          {% endif %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
